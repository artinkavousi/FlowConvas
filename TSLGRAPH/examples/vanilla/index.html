<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>TSLGRAPH Dev Example</title>
		<style>
			:root {
				color-scheme: dark;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				background: #05070d;
				color: #eef7ff;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				background:
					radial-gradient(circle at 20% 0%, rgba(45, 212, 191, 0.14), transparent 30%),
					linear-gradient(145deg, #05070d, #0a0d16 58%, #06080e);
			}

			.shell {
				display: grid;
				grid-template-rows: auto 1fr;
				min-height: 100vh;
			}

			.header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 16px;
				padding: 14px 18px;
				border-bottom: 1px solid rgba(148, 163, 184, 0.18);
				background: rgba(5, 7, 13, 0.78);
				backdrop-filter: blur(16px);
			}

			.brand {
				display: flex;
				flex-direction: column;
				gap: 2px;
			}

			.brand strong {
				font-size: 13px;
				letter-spacing: 0;
			}

			.brand span,
			.status {
				color: rgba(226, 232, 240, 0.66);
				font-size: 12px;
			}

			.actions {
				display: flex;
				gap: 8px;
			}

			button {
				height: 30px;
				border: 1px solid rgba(148, 163, 184, 0.22);
				border-radius: 7px;
				background: rgba(15, 23, 42, 0.76);
				color: #eef7ff;
				cursor: pointer;
				padding: 0 10px;
			}

			button:hover {
				border-color: rgba(45, 212, 191, 0.55);
				background: rgba(20, 31, 48, 0.9);
			}

			.stage {
				min-height: 0;
				padding: 14px;
			}

			.editor {
				width: 100%;
				height: calc(100vh - 88px);
				min-height: 560px;
				overflow: hidden;
				border: 1px solid rgba(148, 163, 184, 0.18);
				border-radius: 8px;
				background: #02040a;
				box-shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
			}
		</style>
	</head>
	<body>
		<main class="shell">
			<header class="header">
				<div class="brand">
					<strong>TSLGRAPH Package Dev</strong>
					<span>Reusable iframe client mounted from the local package server</span>
				</div>
				<div class="actions">
					<button id="clear" type="button">Clear</button>
					<button id="code" type="button">Get Code</button>
				</div>
				<div id="status" class="status">Loading editor</div>
			</header>
			<section class="stage">
				<div id="editor" class="editor"></div>
			</section>
		</main>
		<script type="module" src="./app.js"></script>
	</body>
</html>
